<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReadyRead — Wireframes</title>

<link rel="stylesheet" href="styles.css?v=8" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { height: 100%; margin: 0; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" src="screens/config-flow.jsx"></script>
<script type="text/babel" src="screens/screen1.jsx"></script>
<script type="text/babel" src="screens/screen2.jsx"></script>
<script type="text/babel" src="screens/screen3.jsx"></script>
<script type="text/babel" src="screens/screen4.jsx"></script>
<script type="text/babel" src="screens/screen5.jsx"></script>
<script type="text/babel" src="screens/screen5a.jsx"></script>
<script type="text/babel" src="screens/screen5b.jsx"></script>
<script type="text/babel" src="screens/screen6.jsx"></script>
<script type="text/babel" src="screens/screen7.jsx"></script>

<script type="text/babel" data-presets="env,react">

const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "indigo",
  "fontStyle": "clean",
  "showCallouts": true
}/*EDITMODE-END*/;

const accentMap = {
  teal:    { teal: '#0a6e6b', soft: '#d6eae9' },
  indigo:  { teal: '#3b3b8a', soft: '#dcdcf4' },
  forest:  { teal: '#2d5d3e', soft: '#dde9de' },
  plum:    { teal: '#6b2d5c', soft: '#ecdee7' },
};

function applyTweaks(t) {
  const a = accentMap[t.accent] || accentMap.teal;
  document.documentElement.style.setProperty('--teal', a.teal);
  document.documentElement.style.setProperty('--teal-soft', a.soft);

  if (t.fontStyle === 'clean') {
    document.documentElement.style.setProperty('--hand',
      "'Inter', system-ui, sans-serif");
    document.documentElement.style.setProperty('--hand-2',
      "'Inter', system-ui, sans-serif");
  } else {
    document.documentElement.style.setProperty('--hand',
      "'Architects Daughter', 'Kalam', cursive");
    document.documentElement.style.setProperty('--hand-2',
      "'Caveat', cursive");
  }
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS);

  React.useEffect(() => { applyTweaks(tweaks); }, [tweaks]);

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="setup"
          title="Configuration flow"
          subtitle="SPED coordinator setup — 3-step wizard"
        >
          <DCArtboard id="config" label="01–03 · Configuration flow (interactive — Next/Back)" width={1100} height={760}>
            <ConfigFlow />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="runtime"
          title="Live in production"
          subtitle="Student, parent, teacher, and specialist surfaces"
        >
          <DCArtboard id="s4" label="04 · Student task (kid mode)" width={1100} height={760}>
            <Screen4 />
          </DCArtboard>
          <DCArtboard id="s5" label="05 · Stakeholder notifications" width={1100} height={760}>
            <Screen5 />
          </DCArtboard>
          <DCArtboard id="s5a" label="05a · Writing — passive signal capture" width={1100} height={760}>
            <Screen5A />
          </DCArtboard>
          <DCArtboard id="s5b" label="05b · Reading — passive signal capture" width={1100} height={760}>
            <Screen5B />
          </DCArtboard>
          <DCArtboard id="s6" label="06 · Teacher referral" width={1100} height={760}>
            <Screen6 />
          </DCArtboard>
          <DCArtboard id="s7" label="07 · Evidence package (dual-perspective)" width={1100} height={760}>
            <Screen7 />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Visual style">
          <TweakRadio
            label="Accent"
            value={tweaks.accent}
            onChange={(v) => setTweak('accent', v)}
            options={[
              { value: 'teal',   label: 'Teal' },
              { value: 'indigo', label: 'Indigo' },
              { value: 'forest', label: 'Forest' },
              { value: 'plum',   label: 'Plum' },
            ]}
          />
          <TweakRadio
            label="Font feel"
            value={tweaks.fontStyle}
            onChange={(v) => setTweak('fontStyle', v)}
            options={[
              { value: 'sketch', label: 'Sketchy' },
              { value: 'clean',  label: 'Clean' },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
